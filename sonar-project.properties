sonar.projectKey=Esta-Lux_SnapRoad-Beta-Functional
sonar.organization=esta-lux

sonar.projectName=SnapRoad-Beta-Functional
sonar.sourceEncoding=UTF-8

# Application code (exclude test-only trees / patterns from “sources”)
sonar.sources=app
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.vite/**,**/coverage/**,**/venv/**,**/__pycache__/**,**/*.pyc,**/package-lock.json,**/.git/**,**/tests/**,**/e2e/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Tests are analyzed separately (coverage still attributes to production files)
sonar.tests=app
sonar.test.inclusions=app/backend/tests/**,app/frontend/src/**/*.test.ts,app/frontend/src/**/*.test.tsx,app/frontend/src/**/*.spec.ts,app/frontend/src/**/*.spec.tsx,app/frontend/e2e/**

# CI outputs (GitHub Actions validate.yml uploads these paths before Sonar scan)
sonar.python.version=3.12
sonar.python.coverage.reportPaths=app/backend/coverage.xml
sonar.junit.reportPaths=app/backend/test-results.xml
sonar.javascript.lcov.reportPaths=app/frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=app/frontend/coverage/lcov.info
