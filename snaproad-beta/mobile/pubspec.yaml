name: snaproad
description: SnapRoad - Privacy-first navigation app with rewards

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.1

  # Supabase
  supabase_flutter: ^2.3.0

  # Maps & Navigation
  mapbox_maps_flutter: ^1.0.0
  # mapbox_navigation_flutter: ^0.2.0  # Uncomment when setting up navigation
  geolocator: ^10.1.0
  permission_handler: ^11.1.0

  # Sensors & Driving Detection
  sensors_plus: ^4.0.2

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Networking
  dio: ^5.4.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5
  uuid: ^4.2.2

  # Payments
  flutter_stripe: ^10.1.1

  # Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

  # Camera & Photos
  image_picker: ^1.0.5
  image: ^4.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
