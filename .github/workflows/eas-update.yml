name: EAS Update

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      message:
        description: "What changed (shown in Expo Updates)"
        required: false
        default: "Manual OTA publish"

permissions:
  contents: read

concurrency:
  group: eas-update-production
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: app/mobile/package-lock.json

      - name: Verify EXPO_TOKEN
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          MAPBOX_TOKEN_FOR_CI: ${{ secrets.EXPO_PUBLIC_MAPBOX_TOKEN || vars.EXPO_PUBLIC_MAPBOX_TOKEN || secrets.MAPBOX_TOKEN || vars.MAPBOX_TOKEN }}
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::GitHub Actions secret EXPO_TOKEN is missing. Add it: Repo Settings → Secrets and variables → Actions → New repository secret. Create a token at https://expo.dev/accounts/snaproad/settings/access-tokens"
            exit 1
          fi
          if [ -z "$MAPBOX_TOKEN_FOR_CI" ]; then
            echo "::error::Mapbox token missing in GitHub Actions. Set one of: secret EXPO_PUBLIC_MAPBOX_TOKEN, variable EXPO_PUBLIC_MAPBOX_TOKEN, secret MAPBOX_TOKEN, or variable MAPBOX_TOKEN."
            exit 1
          fi

      - name: Install dependencies
        run: cd app/mobile && npm ci

      - name: EAS Update (production iOS)
        working-directory: app/mobile
        env:
          CI: "1"
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_TOKEN || vars.EXPO_PUBLIC_MAPBOX_TOKEN || secrets.MAPBOX_TOKEN || vars.MAPBOX_TOKEN }}
          APP_ENV: production
          EXPO_PUBLIC_API_URL: https://api.snaproad.app
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          UPDATE_MSG: ${{ github.event.head_commit.message || github.event.inputs.message || format('OTA {0}', github.sha) }}
        run: |
          SAFE_MSG="$(printf '%s' "$UPDATE_MSG" | tr '\r\n' '  ' | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g' | cut -c1-120)"
          if [ -z "$SAFE_MSG" ]; then SAFE_MSG="ota-${GITHUB_SHA}"; fi
          npm run eas:update:production -- --platform ios --message "${SAFE_MSG}-ios"

      - name: EAS Update (production Android)
        working-directory: app/mobile
        env:
          CI: "1"
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_TOKEN || vars.EXPO_PUBLIC_MAPBOX_TOKEN || secrets.MAPBOX_TOKEN || vars.MAPBOX_TOKEN }}
          APP_ENV: production
          EXPO_PUBLIC_API_URL: https://api.snaproad.app
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          UPDATE_MSG: ${{ github.event.head_commit.message || github.event.inputs.message || format('OTA {0}', github.sha) }}
        run: |
          SAFE_MSG="$(printf '%s' "$UPDATE_MSG" | tr '\r\n' '  ' | sed -E 's/[^A-Za-z0-9._-]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g' | cut -c1-120)"
          if [ -z "$SAFE_MSG" ]; then SAFE_MSG="ota-${GITHUB_SHA}"; fi
          npm run eas:update:production -- --platform android --message "${SAFE_MSG}-android"
