name: EAS Update

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Install dependencies
        run: cd app/mobile && npm ci

      - name: EAS Update (production)
        run: cd app/mobile && npx eas-cli update --branch production --message "${{ github.event.head_commit.message }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: production
          EXPO_PUBLIC_API_URL: https://api.snaproad.app
          SENTRY_DISABLE_AUTO_UPLOAD: "true"

