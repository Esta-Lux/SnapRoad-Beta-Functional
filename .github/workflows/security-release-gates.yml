name: Security And Release Gates

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/**"
  push:
    branches: ["main", "develop", "RyanPM", "brian"]
    paths:
      - "app/**"
      - ".github/workflows/**"

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pip-audit bandit
      - run: pip-audit
      - run: bandit -q -r routes services main.py config.py

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  predeploy-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/predeploy_smoke.py

  mobile-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit
