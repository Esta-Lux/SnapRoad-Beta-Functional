# -----------------------------------------------------------------------------
# Automated checks run HERE ONLY — push/PR to develop|main runs backend tests + coverage,
# frontend lint/tests/build + Playwright E2E (routing, auth screens, welcome UI, optional
# live admin/partner login if E2E_* secrets set), mobile tsc, Sonar (if token set).
# You do not need to install Playwright or run the full suite locally before merge.
# -----------------------------------------------------------------------------
# Multi-domain web (app. / partner. / admin.): operational checklist (not CI)
# - Supabase Auth: add each production origin to Redirect URLs.
# - OAuth providers: allowlist redirect URIs for each origin.
# - Backend: include all three origins in CHECKOUT_ALLOWED_ORIGINS (or equivalent).
# - Static hosting: SPA fallback so deep links (e.g. /portal/partner) serve index.html.
# -----------------------------------------------------------------------------
# Optional for CI: org var STAGING_API_URL → run tests/integration against staging.
# SonarCloud: sonarqube job + repo-root sonar-project.properties
# -----------------------------------------------------------------------------

name: Validate

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install pip-audit
          pip-audit -r requirements.txt

      - name: Byte-compile (syntax check)
        run: python -m compileall -q .

      - name: Smoke import app
        run: python -c "import main"

      - name: Install test tooling
        run: python -m pip install pytest pytest-cov

      - name: Unit + API (in-process) tests + coverage (Sonar)
        env:
          SENTRY_DSN: ""
          ENVIRONMENT: development
        run: |
          python -m pytest tests/test_ci_smoke.py tests/unit -q \
            --cov=. \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml

      - name: Upload backend reports for Sonar
        uses: actions/upload-artifact@v4
        with:
          name: sonar-backend-reports
          path: |
            app/backend/coverage.xml
            app/backend/test-results.xml

      - name: Integration tests (staging)
        if: ${{ vars.STAGING_API_URL != '' }}
        env:
          REACT_APP_BACKEND_URL: ${{ vars.STAGING_API_URL }}
        run: python -m pytest tests/integration -m integration -q

      - name: Legacy HTTP pytest suite (non-blocking)
        run: |
          python -m pytest tests/ -q \
            --ignore=tests/unit \
            --ignore=tests/integration \
            --ignore=tests/test_ci_smoke.py
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    env:
      VITE_API_URL: ""
      VITE_BACKEND_URL: ""
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
      VITE_PUBLIC_SUPABASE_URL: ""
      VITE_SUPABASE_PUBLISHABLE_KEY: ""
      VITE_PUBLIC_SUPABASE_ANON_KEY: ""
      VITE_OHGO_API_KEY: ""
      VITE_MAPBOX_TOKEN: ""
      VITE_APP_VERSION: "0.0.0-ci"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/frontend/package-lock.json

      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

      # Optional: E2E_ADMIN_EMAIL / E2E_ADMIN_PASSWORD / E2E_PARTNER_* repo vars for live-login specs.
      # Optional: E2E_ALL_BROWSERS=true → install firefox+webkit and run multi-browser (slower).
      - name: E2E (Playwright)
        env:
          CI: true
          E2E_ADMIN_EMAIL: ${{ vars.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_PARTNER_EMAIL: ${{ vars.E2E_PARTNER_EMAIL }}
          E2E_PARTNER_PASSWORD: ${{ secrets.E2E_PARTNER_PASSWORD }}
          E2E_ALL_BROWSERS: ${{ vars.E2E_ALL_BROWSERS }}
        run: |
          if [ "${E2E_ALL_BROWSERS}" = "true" ] || [ "${E2E_ALL_BROWSERS}" = "1" ]; then
            npx playwright install --with-deps
          else
            npx playwright install --with-deps chromium
          fi
          npm run test:e2e

      - name: Upload frontend LCOV for Sonar
        uses: actions/upload-artifact@v4
        with:
          name: sonar-frontend-lcov
          path: app/frontend/coverage/lcov.info

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: app/mobile/package-lock.json

      - run: npm ci
      - run: npm audit --omit=dev --audit-level=moderate
      - run: npx tsc --noEmit

  # Runs only when SONAR_TOKEN is configured. Fork PRs skip (no base-repo secrets on untrusted workflows).
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: [backend, frontend, mobile]
    if: ${{ secrets.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: sonar-backend-reports

      - uses: actions/download-artifact@v4
        with:
          name: sonar-frontend-lcov

      - name: SonarQube Scan
        # Pinned to v6.0.0 commit (supply-chain policy: full SHA, not floating @v6).
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
