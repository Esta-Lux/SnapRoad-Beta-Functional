[pytest]
# Default discovery: everything under tests/ (avoids collecting app/backend/scripts/* helpers).
# CI runs: pytest tests/test_ci_smoke.py tests/unit (in-process only). Legacy HTTP tests need a live API.
testpaths = tests
markers =
    integration: requires a live API base URL (REACT_APP_BACKEND_URL)
pythonpath = .
asyncio_mode = auto
